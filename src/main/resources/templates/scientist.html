<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Datenverwaltung | Like Hero To Zero</title>

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="site-header">
    <div class="container header-inner">

        <a class="brand" href="/">
            LIKE HERO TO ZERO
        </a>

        <form method="post" th:action="@{/logout}">
            <button type="submit">
                Abmelden
            </button>
        </form>

    </div>
</header>

<main class="container">

    <section class="hero">

        <p class="eyebrow">
            Geschützter Bereich
        </p>

        <h1>
            Datenverwaltung für Wissenschaftler:innen
        </h1>

        <p class="intro">
            Hier können neue CO₂-Datensätze erfasst und dauerhaft
            in der Datenbank gespeichert werden.
        </p>

    </section>

    <section class="card">

        <div
                class="result-box"
                th:if="${successMessage != null}">

            <strong th:text="${successMessage}">
                Datensatz wurde erfolgreich gespeichert.
            </strong>

        </div>

        <div
                class="result-box error-box"
                th:if="${errorMessage != null}">

            <strong th:text="${errorMessage}">
                Fehler beim Speichern des Datensatzes.
            </strong>

        </div>

        <form method="post" th:action="@{/scientist/emissions}">

            <div class="field-group">

                <label for="countryId">
                    Land
                </label>

                <select
                        id="countryId"
                        name="countryId"
                        required>

                    <option value="">
                        Bitte Land auswählen
                    </option>

                    <option
                            th:each="country : ${countries}"
                            th:value="${country.id}"
                            th:text="${country.name}">
                        Land
                    </option>

                </select>

            </div>

            <div class="field-group form-spacing">

                <label for="year">
                    Jahr
                </label>

                <input
                        id="year"
                        name="year"
                        type="number"
                        min="1900"
                        max="2100"
                        required>

            </div>

            <div class="field-group form-spacing">

                <label for="co2Kt">
                    CO₂-Ausstoß in kt
                </label>

                <input
                        id="co2Kt"
                        name="co2Kt"
                        type="number"
                        step="0.01"
                        min="0"
                        required>

            </div>

            <button
                    class="primary-button"
                    type="submit">

                Datensatz speichern

            </button>

        </form>

    </section>

</main>

</body>
</html>
